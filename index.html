<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B1220">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mundial 2026">
  <title>Mundial 2026 · Fixture interactivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:opsz,wght@14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/img/logo/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/logo/android-chrome-512x512.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/logo/android-chrome-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/logo/favicon-32x32.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="auth-gate" id="authGate" hidden>
    <div class="auth-gate__card">
      <p class="auth-gate__kicker">Mundial 2026</p>
      <h2 class="auth-gate__title">Iniciá sesión para guardar tu pronóstico</h2>
        <button class="auth-gate__google-btn" id="btnGoogle">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continuar con Google
        </button>
      <div class="auth-gate__divider"><span>o</span></div>
      <form class="auth-gate__form" id="guestForm">
        <label class="sr-only" for="guestName">Tu nombre</label>
        <input class="auth-gate__input" id="guestName" type="text" placeholder="Tu nombre" maxlength="24"
          autocomplete="name" required>
        <button class="auth-gate__submit" type="submit">Continuar</button>
      </form>
      <p class="auth-gate__hint">Cada nombre guarda su propio pronóstico en este dispositivo.</p>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar__row">
      <div class="topbar__brand">
        <img class="topbar__seal" src="assets/img/logo/android-chrome-512x512.png" alt="" width="40" height="40">
        <div class="topbar__wordmark">
          <span class="topbar__kicker">FIFA World Cup</span>
          <h1 class="topbar__title">Mundial 20<span>26</span></h1>
        </div>
      </div>
      <div class="topbar__hosts" aria-label="Anfitriones">
        <img src="https://flagcdn.com/w40/ca.png" alt="Canadá" width="40" height="30">
        <img src="https://flagcdn.com/w40/mx.png" alt="México" width="40" height="30">
        <img src="https://flagcdn.com/w40/us.png" alt="Estados Unidos" width="40" height="30">
      </div>
      <div class="topbar__account">
        <div class="profile" id="profileChip"></div>
        <button class="topbar__ghost" id="switchUser">Cambiar usuario</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema" aria-pressed="false">
          <svg class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="M4.93 4.93l1.41 1.41" />
            <path d="M17.66 17.66l1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="M6.34 17.66l-1.41 1.41" />
            <path d="M19.07 4.93l-1.41 1.41" />
          </svg>
        </button>
        <button class="topbar__ghost" id="reset">Reiniciar</button>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab tab--active" data-tab="groups">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Grupos
      </button>
      <button class="tab" data-tab="ko">Llaves</button>
      <button class="tab" data-tab="scorers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 3a5 5 0 0 1 3.5 8.5L12 14l-3.5-2.5A5 5 0 0 1 12 3Z" />
          <path d="M12 14v7" />
          <path d="M8.5 11.5L5 14" />
          <path d="M15.5 11.5L19 14" />
        </svg>
        Goleadores
      </button>
      <button class="tab" data-tab="league">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Liga
      </button>
    </nav>

    <div class="bar">
      <div class="progress">
        <div class="progress__bar">
          <div class="progress__fill" id="bar"></div>
        </div>
        <span class="progress__label" id="prog">0 / 72</span>
      </div>
      <div class="live">
        <label class="switch">
          <input type="checkbox" id="liveToggle" checked>
          <span class="switch__track"></span>
          Resultados oficiales
        </label>
        <span class="live__status" id="liveStatus"></span>
        <button class="live__refresh" id="refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
            <path d="M8 16H3v5" />
          </svg>
          Actualizar
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="view" id="view-groups">
      <div class="board" id="board"></div>
      <p class="note" id="note"></p>
    </section>
    <section class="view" id="view-ko" hidden></section>
    <section class="view" id="view-scorers" hidden></section>
    <section class="view" id="view-league" hidden></section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
